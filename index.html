<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario 1° Semestre · Pumahue Peñalolén</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0b1d3a;
  --orange:#e8600a;
  --cream:#faf7f2;
  --white:#fff;
  --border:#e5ddd2;
  --muted:#78716c;
  --text:#1c1917;

  --feriado:#dc2626;
  --reunion:#1d4ed8;
  --deporte:#15803d;
  --campur:#7c3aed;
  --jeans:#be185d;
  --simulacro:#d97706;
  --general:#475569;
}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--text);min-height:100vh}

/* HEADER */
header{
  background:var(--navy);
  padding:44px 20px 36px;
  text-align:center;
  position:relative;overflow:hidden;
}
header::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 100% at 85% 0%,rgba(232,96,10,.2) 0%,transparent 55%);
  pointer-events:none;
}
.eyebrow{
  display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
  color:var(--orange);background:rgba(232,96,10,.12);border:1px solid rgba(232,96,10,.3);
  padding:4px 14px;border-radius:99px;margin-bottom:16px;position:relative;
}
h1{
  font-family:'Fraunces',serif;font-size:clamp(28px,6vw,50px);font-weight:900;
  color:#fff;line-height:1.1;margin-bottom:8px;position:relative;
}
h1 em{font-style:normal;color:var(--orange)}
.subtitle{color:rgba(255,255,255,.5);font-size:13.5px;position:relative}

/* FILTER BAR */
.filter-bar{
  background:var(--navy);border-bottom:2px solid rgba(232,96,10,.3);
  padding:12px 16px;
  display:flex;flex-wrap:wrap;justify-content:center;gap:8px;
  position:sticky;top:0;z-index:100;
}
.filter-btn{
  display:flex;align-items:center;gap:6px;
  font-family:'Inter',sans-serif;font-size:11.5px;font-weight:600;
  padding:5px 13px;border-radius:99px;cursor:pointer;
  border:2px solid transparent;
  transition:all .18s;
  color:#fff;
  opacity:.45;
}
.filter-btn .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.filter-btn.active{opacity:1;border-color:rgba(255,255,255,.25);background:rgba(255,255,255,.1)}
.filter-btn:hover{opacity:.85}

/* MONTH NAV */
.month-nav{
  display:flex;justify-content:center;gap:6px;flex-wrap:wrap;
  padding:24px 16px 0;max-width:900px;margin:0 auto;
}
.mnav-btn{
  font-family:'Fraunces',serif;font-size:13px;font-weight:800;
  padding:8px 18px;border-radius:99px;cursor:pointer;
  border:2px solid var(--border);background:var(--white);color:var(--muted);
  transition:all .18s;
}
.mnav-btn:hover{border-color:var(--navy);color:var(--navy)}
.mnav-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}

/* MAIN */
main{max-width:900px;margin:0 auto;padding:0 16px 80px}

/* MONTH SECTION */
.month-sec{padding-top:40px}
.month-title{
  display:flex;align-items:baseline;gap:12px;margin-bottom:6px;
}
.month-title h2{
  font-family:'Fraunces',serif;font-size:26px;font-weight:900;color:var(--navy);
}
.month-theme{
  font-size:11px;font-weight:600;color:var(--orange);
  background:rgba(232,96,10,.07);border:1px solid rgba(232,96,10,.18);
  padding:3px 10px;border-radius:99px;white-space:nowrap;
}

/* CALENDAR GRID */
.cal-grid{
  background:var(--white);
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
  margin-bottom:4px;
}
.cal-header{
  display:grid;grid-template-columns:repeat(7,1fr);
  background:var(--navy);
}
.cal-header div{
  text-align:center;padding:9px 4px;
  font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:rgba(255,255,255,.5);
}
.cal-header div:nth-child(1),
.cal-header div:nth-child(7){color:rgba(255,100,80,.6)}

.cal-body{
  display:grid;grid-template-columns:repeat(7,1fr);
}
.cal-cell{
  border-right:1px solid var(--border);
  border-bottom:1px solid var(--border);
  min-height:80px;
  padding:6px 5px 5px;
  position:relative;
  transition:background .15s;
}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell.empty{background:rgba(0,0,0,.015)}
.cal-cell.today{background:rgba(232,96,10,.04)}
.cal-cell.weekend .day-num{color:rgba(220,38,38,.6)}
.cal-cell.has-event:hover{background:#f9f5ef;cursor:pointer}

.day-num{
  font-size:11.5px;font-weight:700;color:#aaa;
  display:block;margin-bottom:4px;
}
.cal-cell.has-event .day-num{color:var(--navy)}

/* EVENT PILLS */
.pill{
  display:block;
  font-size:9.5px;font-weight:700;
  padding:2px 6px;border-radius:5px;
  color:#fff;margin-bottom:2px;
  line-height:1.35;
  cursor:pointer;
  transition:opacity .15s;
}
.pill:hover{opacity:.85}
.pill.feriado  {background:var(--feriado)}
.pill.reunion  {background:var(--reunion)}
.pill.deporte  {background:var(--deporte)}
.pill.campur   {background:var(--campur)}
.pill.jeans    {background:var(--jeans)}
.pill.simulacro{background:var(--simulacro)}
.pill.general  {background:var(--general)}

.pill.hidden{display:none}

/* VACACIONES BANNER */
.vac-banner{
  background:linear-gradient(135deg,var(--navy) 0%,#1a3564 100%);
  border-radius:14px;padding:22px 24px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  margin-top:12px;flex-wrap:wrap;
}
.vac-text .label{font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:3px}
.vac-text .title{font-family:'Fraunces',serif;font-size:20px;font-weight:800;color:#fff}
.vac-text .sub{font-size:12px;color:rgba(255,255,255,.5);margin-top:3px}
.gcal-vac{
  display:inline-flex;align-items:center;gap:7px;
  margin-top:10px;padding:8px 16px;border-radius:9px;
  background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.22);
  color:#fff;font-size:12px;font-weight:600;text-decoration:none;
  transition:background .18s;
}
.gcal-vac:hover{background:rgba(255,255,255,.2)}
.vac-emoji{font-size:38px}

/* TOOLTIP / MODAL */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;
  display:flex;align-items:center;justify-content:center;padding:20px;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.overlay.show{opacity:1;pointer-events:all}
.modal{
  background:#fff;border-radius:20px;padding:28px 28px 24px;
  max-width:420px;width:100%;
  box-shadow:0 20px 60px rgba(0,0,0,.25);
  transform:translateY(12px);transition:transform .2s;
  position:relative;
}
.overlay.show .modal{transform:translateY(0)}
.modal-tag{
  display:inline-block;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  padding:3px 10px;border-radius:99px;color:#fff;margin-bottom:12px;
}
.modal h3{font-family:'Fraunces',serif;font-size:22px;font-weight:800;color:var(--navy);margin-bottom:8px;line-height:1.2}
.modal .modal-date{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:10px}
.modal .modal-detail{font-size:13.5px;color:var(--text);line-height:1.6;margin-bottom:16px}
.modal-gcal{
  display:inline-flex;align-items:center;gap:7px;
  padding:9px 18px;border-radius:10px;
  background:var(--navy);color:#fff;
  font-size:13px;font-weight:600;text-decoration:none;
  transition:background .18s;
}
.modal-gcal:hover{background:#1a3564}
.modal-close{
  position:absolute;top:16px;right:16px;
  background:none;border:none;font-size:22px;cursor:pointer;
  color:#aaa;line-height:1;
}
.modal-close:hover{color:var(--text)}

/* LINK inside modal */
.modal a.inline-link{color:var(--orange);font-weight:600}

/* FOOTER */
footer{
  background:var(--navy);color:rgba(255,255,255,.4);
  text-align:center;padding:24px;font-size:12.5px;line-height:1.8;
}
footer strong{color:rgba(255,255,255,.7)}

@media(max-width:600px){
  .cal-cell{min-height:58px;padding:4px 3px}
  .pill{font-size:8.5px;padding:2px 4px}
  .month-theme{display:none}
  .day-num{font-size:10px}
}
</style>
</head>

  // JULIO
  {y:2025,m:7,d:6, title:"🎒 Inicio del 2° Semestre", cat:"general", detail:"Vuelta a clases luego de vacaciones de invierno.", gcal:"https://calendar.google.com/calendar/r/eventedit?text=Inicio+2%C2%B0+Semestre+%E2%80%93+Pumahue+Pe%C3%B1alol%C3%A9n&dates=20250707/20250707"},
];

const MONTHS = [
  {m:3, name:"Marzo",  theme:"BE WELL: Sueño reparador y adecuado"},
  {m:4, name:"Abril",  theme:"BE WELL: Dieta y nutrición sostenible"},
  {m:5, name:"Mayo",   theme:"BE WELL: Mes de la seguridad escolar"},
  {m:6, name:"Junio",  theme:"BE WELL: Conexión con uno mismo y otros"},
  {m:7, name:"Julio",  theme:"BE WELL: Hacer cosas que nos gustan"},
];

const DAY_NAMES = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const MONTH_NAMES = ['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

const CAT_LABELS = {
  feriado:'Feriado', reunion:'Reunión', deporte:'Deportes',
  campur:'CAMPUR', jeans:'Jeans Day', simulacro:'Simulacro', general:'General'
};

// ── ACTIVE FILTERS ──
let activeFilters = new Set(['feriado','reunion','deporte','campur','jeans','simulacro','general']);

// ── BUILD CALENDARS ──
function buildCalendars() {
  const container = document.getElementById('calendar-container');
  container.innerHTML = '';

  MONTHS.forEach(mo => {
    const sec = document.createElement('section');
    sec.className = 'month-sec';
    sec.id = 'month-' + mo.m;

    // Header
    sec.innerHTML = `
      <div class="month-title">
        <h2>${mo.name}</h2>
        <span class="month-theme">✦ ${mo.theme}</span>
      </div>
    `;

    // Grid
    const grid = document.createElement('div');
    grid.className = 'cal-grid';

    // Day name header
    const hdr = document.createElement('div');
    hdr.className = 'cal-header';
    DAY_NAMES.forEach(d => { hdr.innerHTML += `<div>${d}</div>`; });
    grid.appendChild(hdr);

    // Body
    const body = document.createElement('div');
    body.className = 'cal-body';

    const firstDay = new Date(2025, mo.m - 1, 1).getDay(); // 0=Sun
    const daysInMonth = new Date(2025, mo.m, 0).getDate();
    const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;

    for (let i = 0; i < totalCells; i++) {
      const cell = document.createElement('div');
      const dayNum = i - firstDay + 1;
      const isWeekend = (i % 7 === 0 || i % 7 === 6);

      if (dayNum < 1 || dayNum > daysInMonth) {
        cell.className = 'cal-cell empty';
        if (isWeekend) cell.classList.add('weekend');
        body.appendChild(cell);
        continue;
      }

      const dayEvents = EVENTS.filter(e => e.y === 2025 && e.m === mo.m && e.d === dayNum);
      cell.className = 'cal-cell' + (isWeekend ? ' weekend' : '') + (dayEvents.length ? ' has-event' : '');
      cell.innerHTML = `<span class="day-num">${dayNum}</span>`;

      dayEvents.forEach(ev => {
        const pill = document.createElement('span');
        pill.className = `pill ${ev.cat}`;
        pill.textContent = shorten(ev.title);
        pill.dataset.idx = EVENTS.indexOf(ev);
        pill.onclick = (e) => { e.stopPropagation(); openModal(ev); };
        cell.appendChild(pill);
      });

      if (dayEvents.length) {
        cell.onclick = () => { if(dayEvents.length === 1) openModal(dayEvents[0]); };
      }

      body.appendChild(cell);
    }

    grid.appendChild(body);
    sec.appendChild(grid);

    // Special: Vacaciones banner after Junio
    if (mo.m === 6) {
      sec.innerHTML += `
        <div class="vac-banner">
          <div class="vac-text">
            <div class="label">🏖️ Vacaciones de invierno</div>
            <div class="title">22 de junio — 3 de julio</div>
            <div class="sub">Regreso: lunes 6 de julio (inicio 2° semestre)</div>
            <a class="gcal-vac" href="https://calendar.google.com/calendar/r/eventedit?text=%F0%9F%8F%96%EF%B8%8F+Vacaciones+de+Invierno+%E2%80%93+Pumahue&dates=20250622/20250704&details=Regreso+el+lunes+6+de+julio." target="_blank">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="17" rx="2" stroke="white" stroke-width="2"/><path d="M3 9h18M8 2v3M16 2v3" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
              Agregar vacaciones al calendario
            </a>
          </div>
          <div class="vac-emoji">🏖️</div>
        </div>
      `;
    }

    container.appendChild(sec);
  });

  applyFilters();
}

function shorten(title) {
  // Remove emoji prefix for pill space
  const clean = title.replace(/^[\u{1F300}-\u{1FAFF}🏖️🎒📅🔔🎓🎉🏆📚🐣\s]+/u, '').trim();
  return clean.length > 26 ? clean.slice(0, 24) + '…' : clean;
}

// ── FILTERS ──
document.getElementById('filterBar').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  const cat = btn.dataset.cat;

  if (cat === 'all') {
    const allActive = activeFilters.size === 7;
    if (allActive) {
      activeFilters.clear();
    } else {
      activeFilters = new Set(['feriado','reunion','deporte','campur','jeans','simulacro','general']);
    }
  } else {
    if (activeFilters.has(cat)) activeFilters.delete(cat);
    else activeFilters.add(cat);
  }

  updateFilterUI();
  applyFilters();
});

function updateFilterUI() {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    const cat = btn.dataset.cat;
    if (cat === 'all') {
      btn.classList.toggle('active', activeFilters.size === 7);
    } else {
      btn.classList.toggle('active', activeFilters.has(cat));
    }
  });
}

function applyFilters() {
  document.querySelectorAll('.pill').forEach(pill => {
    const cat = [...pill.classList].find(c => c !== 'pill' && c !== 'hidden');
    pill.classList.toggle('hidden', !activeFilters.has(cat));
  });
  // Update has-event class
  document.querySelectorAll('.cal-cell:not(.empty)').forEach(cell => {
    const visible = cell.querySelectorAll('.pill:not(.hidden)').length > 0;
    cell.classList.toggle('has-event', visible);
  });
}

// ── MONTH NAV ──
document.querySelectorAll('.mnav-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    const m = this.dataset.month;
    const sec = document.getElementById('month-' + m);
    if (!sec) return;
    const top = sec.getBoundingClientRect().top + window.pageYOffset - 90;
    window.scrollTo({top, behavior:'smooth'});
  });
});

window.addEventListener('scroll', () => {
  let current = '3';
  MONTHS.forEach(mo => {
    const el = document.getElementById('month-' + mo.m);
    if (el && el.getBoundingClientRect().top <= 100) current = String(mo.m);
  });
  document.querySelectorAll('.mnav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.month === current);
  });
}, {passive:true});

// ── MODAL ──
function openModal(ev) {
  const overlay = document.getElementById('overlay');
  document.getElementById('modal-tag').textContent = CAT_LABELS[ev.cat] || 'Actividad';
  document.getElementById('modal-tag').style.background = getComputedStyle(document.documentElement).getPropertyValue('--' + ev.cat).trim() || '#475569';
  document.getElementById('modal-date').textContent = formatDate(ev.y, ev.m, ev.d);
  document.getElementById('modal-title').textContent = ev.title.replace(/^[\u{1F300}-\u{1FAFF}🏖️🎒📅🔔🎓🎉🏆📚🐣\s]+/u, '').trim();
  document.getElementById('modal-detail').innerHTML = ev.detail || '';
  document.getElementById('modal-gcal').href = ev.gcal;
  overlay.classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('overlay') && !e.target.classList.contains('modal-close')) return;
  document.getElementById('overlay').classList.remove('show');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal({target: document.getElementById('overlay')});
});

function formatDate(y, m, d) {
  const date = new Date(y, m - 1, d);
  const days = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  return `${days[date.getDay()]} ${d} de ${MONTH_NAMES[m]} de ${y}`;
}

// ── INIT ──
buildCalendars();
</script>
